http {
    server {

        listen 7002;  # Accept HTTP on port 7002

        # Serve static files (CSS, JS, images)
        location /static/ {
            root /static;
        }

        # Proxy requests for HTML pages
        location / {
            proxy_pass http://paffenroth-23.dyn.wpi.edu:9002; # Backend server pass-through
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy API requests for AniZenith chat
        location /chat {
            proxy_pass http://paffenroth-23.dyn.wpi.edu:9002;  # Backend server pass-through
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
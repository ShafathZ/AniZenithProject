  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      # Map a volume from the local (to where compose.yml is run) prometheus.yml file to an internal container volume
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - '22023:9090'
    depends_on:
      - frontend
      - backend
      # TODO: Uncomment these once services are added
#      - cadvisor
#      - node-exporter
    networks:
      - anizenith_net
    restart: unless-stopped


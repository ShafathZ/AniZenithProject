services:

  # Spin up the backend
  backend:
    image: surigo/anizenith_backend:latest
    container_name: anizenith_backend
    ports:
      - '22021:9002'
    networks:
      - anizenith_net
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9002/health']
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 90s
    restart: unless-stopped


  # Spin up the frontend
  frontend:
    image: surigo/anizenith_frontend:latest
    container_name: anizenith_frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '22020:7002'
    networks:
      - anizenith_net
    restart: unless-stopped





